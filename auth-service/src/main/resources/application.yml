spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow_auth
    username: finflow
    password: finflow_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml